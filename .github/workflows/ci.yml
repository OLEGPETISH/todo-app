name: CI/CD Todo App

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backend image
        run: docker build -t petish/todo-backend:latest ./backend

      - name: Build frontend image
        run: docker build -t petish/todo-frontend:latest ./frontend

      - name: Create Docker network
        run: docker network create todo-network

      - name: Start db container
        run: |
          docker run -d \
            --name db \
            --network todo-network \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres123 \
            -e POSTGRES_DB=tododb \
            -p 5432:5432 \
            postgres:15-alpine

      - name: Wait for db to be ready
        run: sleep 10

      - name: Start backend container
        run: |
          docker run -d \
            --name back \
            --network todo-network \
            -p 3000:3000 \
            -e DB_HOST=db \
            -e DB_PORT=5432 \
            -e DB_USER=postgres \
            -e DB_PASSWORD=postgres123 \
            -e DB_NAME=tododb \
            -e SMTP_HOST=smtp.gmail.com \
            -e SMTP_PORT=587 \
            -e SMTP_USER=test@gmail.com \
            -e SMTP_PASS=testpass \
            -e IMAP_HOST=imap.gmail.com \
            -e IMAP_PORT=993 \
            -e POP3_HOST=pop.gmail.com \
            -e POP3_PORT=995 \
            petish/todo-backend:latest

      - name: Start frontend container
        run: |
          docker run -d \
            --name front \
            --network todo-network \
            -p 8080:80 \
            petish/todo-frontend:latest

      - name: Wait for containers to start
        run: sleep 10

      - name: Check backend health
        run: curl -f http://localhost:3000/tasks

      - name: Check frontend health
        run: curl -f http://localhost:8080

      - name: Stop and remove containers
        run: |
          docker stop db back front
          docker rm db back front

      - name: Remove network
        run: docker network rm todo-network

      - name: Push backend to Docker Hub
        run: docker push petish/todo-backend:latest

      - name: Push frontend to Docker Hub
        run: docker push petish/todo-frontend:latest